<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
      color: #c9d1d9;
      background: #0d1117;
      line-height: 1.6;
    }
    a { color: #58a6ff; }
    h1, h2, h3, h4 { color: #e6edf3; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
    code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; }
    pre code { padding: 0; background: none; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
    th { background: #161b22; }
    blockquote { border-left: 3px solid #ff6b6b; padding-left: 16px; color: #8b949e; }
    img { max-width: 100%; }
    details { margin: 8px 0; }
    summary { cursor: pointer; font-weight: 600; }
    ul, ol { padding-left: 24px; }
    li { margin: 4px 0; }
    hr { border: none; border-top: 1px solid #21262d; margin: 24px 0; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
