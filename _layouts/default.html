<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: #c9d1d9;
      background: #0d1117;
      line-height: 1.6;
    }
    .site-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #161b22;
      border-bottom: 1px solid #21262d;
    }
    .site-nav-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
    }
    .site-nav-brand {
      color: #e6edf3;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .site-nav-brand:hover { color: #58a6ff; }
    .site-nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      list-style: none;
    }
    .site-nav-links a {
      color: #8b949e;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.15s;
    }
    .site-nav-links a:hover { color: #58a6ff; }
    .site-nav-links a.active { color: #58a6ff; }
    .site-nav-links .nav-external {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .site-content {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    a { color: #58a6ff; }
    h1, h2, h3, h4 { color: #e6edf3; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
    code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; }
    pre code { padding: 0; background: none; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
    th { background: #161b22; }
    blockquote { border-left: 3px solid #ff6b6b; padding-left: 16px; color: #8b949e; }
    img { max-width: 100%; }
    details { margin: 8px 0; }
    summary { cursor: pointer; font-weight: 600; }
    ul, ol { padding-left: 24px; }
    li { margin: 4px 0; }
    hr { border: none; border-top: 1px solid #21262d; margin: 24px 0; }
    .site-footer {
      border-top: 1px solid #21262d;
      margin-top: 48px;
      padding: 24px;
      text-align: center;
      color: #8b949e;
      font-size: 13px;
    }
    .site-footer a { color: #58a6ff; text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
    @media (max-width: 640px) {
      .site-nav-inner { padding: 0 16px; }
      .site-nav-links { gap: 12px; }
      .site-nav-links a { font-size: 13px; }
      .site-content { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="{{ site.baseurl }}/" class="site-nav-brand">🍪 CookieJar Lab</a>
      <ul class="site-nav-links">
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/cookiejar-lab/docs/lab-guide">Lab Guide</a></li>
        <li><a href="{{ site.baseurl }}/cookiejar-lab/docs/security-notes">Security Notes</a></li>
        <li><a href="{{ site.baseurl }}/demo/">Demo</a></li>
        <li><a href="https://github.com/cyberdesserts/cookiejar-lab" class="nav-external"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> GitHub</a></li>
      </ul>
    </div>
  </nav>
  <main class="site-content">
    {{ content }}
  </main>
  <footer class="site-footer">
    A <a href="https://cyberdesserts.com">CyberDesserts</a> project &middot; Learn Cybersecurity By Doing
  </footer>
</body>
</html>
